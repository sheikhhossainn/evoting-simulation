name: CI

# Runs the three packages' checks on every PR into dev.
# (main is not wired up yet — that comes later.)

on:
  pull_request:
    branches: [dev]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build # tsc -b && vite build — typecheck + build in one
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx tsc --noEmit -p tsconfig.json
        working-directory: backend
      # Crypto/Merkle smoke test — pure logic, no DB/chain required.
      - run: npx ts-node src/scripts/test-merkle-batch.ts
        working-directory: backend

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            blockchain/package-lock.json
      # blockchain/test imports backend/src/merkle/merkleTree.ts directly
      # (single source of truth for the hashing scheme), which requires
      # `ethers` — so backend's deps must be installed too, not just
      # blockchain's.
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: blockchain
      - run: npm run compile
        working-directory: blockchain
      # Runs on Hardhat's in-memory network — no Amoy RPC/funds needed.
      - run: npm test
        working-directory: blockchain
